{% extends "onboarding/layout.html" %}

{% block title %}Onboarding Step 3 | CommuteSmart{% endblock %}

{% block onboarding_content %}
  <p class="label">Step 3</p>
  <h2>How often are you commuting?</h2>
  <p class="section-copy">A quick weekly rhythm helps us estimate fares, time, and budget pressure.</p>

  <form method="post" class="form-stack" data-onboarding-preview>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <label class="input-group">
      <span>Days per week</span>
      <input type="range" name="days_per_week" min="1" max="7" value="{{ data.days_per_week }}">
      <strong class="range-output">{{ data.days_per_week }} days</strong>
    </label>
    <label class="input-group">
      <span>Trips per day</span>
      <select name="trips_per_day">
        {% for option in [1, 2, 3, 4] %}
          <option value="{{ option }}" {% if option == data.trips_per_day %}selected{% endif %}>{{ option }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="input-group">
      <span>Commute preference</span>
      <select name="commute_time_preference">
        {% for value, label in [("AM", "Mostly mornings"), ("PM", "Mostly evenings"), ("both", "Both")] %}
          <option value="{{ value }}" {% if value == data.commute_time_preference %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </label>
    <div class="split-actions">
      <a class="btn-secondary" href="{{ url_for('onboarding.skip_step', step=3) }}">Skip</a>
      <button class="btn-primary" type="submit">Next step</button>
    </div>
  </form>
{% endblock %}
