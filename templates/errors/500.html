{% extends "base.html" %}

{% block title %}Server Error | CommuteSmart{% endblock %}

{% block content %}
  <div class="error-shell">
    <div class="error-card">
      <div style="font-size:64px; font-weight:800; color:var(--baby-blue);">500</div>
      <h2 style="color:var(--text-primary); margin-bottom:1rem;">Something went wrong on our end.</h2>
      <p style="color:var(--text-muted); margin-bottom:2rem;">It's not you, it's the train.</p>
      <a href="{{ url_for('auth.landing') }}" class="btn-primary btn-inline error-cta" style="display:inline-block; padding:12px 32px;">Try again</a>
    </div>
  </div>
{% endblock %}
